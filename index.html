<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#08111f"/>
  <title>StarQuiz V9 Premium</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-row">
        <img src="assets/icon-192.png" class="mini-logo" alt="StarQuiz V9 Premium" onerror="this.outerHTML='<div class=\'mini-logo logo-fallback\' style=\'width:46px;height:46px;font-size:16px;border-radius:15px\'>SQ</div>'">
        <div>
          <div class="brand">StarQuiz V9 Premium</div>
          <div class="subtitle">KKTC Kamu Sınavı</div>
        </div>
      </div>
      <button id="resetBtn" class="ghost-btn">Sıfırla</button>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
      <button data-page="home" class="nav-btn active">🏠<span>Ana</span></button>
      <button data-page="exam" class="nav-btn">🎯<span>Deneme</span></button>
      <button data-page="topics" class="nav-btn">📚<span>Konu</span></button>
      <button data-page="wrong" class="nav-btn">❌<span>Yanlış</span></button>
      <button data-page="stats" class="nav-btn">📊<span>Analiz</span></button>
    </nav>
  </div>
  <script src="questions.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
