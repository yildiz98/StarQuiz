<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#08111f"/>
  <title>StarQuiz Türkçe Matematik</title>
  <link rel="manifest" href="./manifest.json?v=trmath1">
  <link rel="icon" href="./favicon.png?v=trmath1">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=trmath1">
  <link rel="stylesheet" href="./style.css?v=trmath1">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-row">
        <img src="./icon-192.png?v=trmath1" class="mini-logo" alt="StarQuiz">
        <div>
          <div class="brand">StarQuiz</div>
          <div class="subtitle">KKTC Kamu Sınavı Hazırlık</div>
        </div>
      </div>

      <div class="author-signature">
        <span>Designed &amp; Developed by</span>
        <strong>Hüseyin Yıldız</strong>
      </div>
      <button id="resetBtn" class="ghost-btn" type="button">Sıfırla</button>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
      <button data-page="home" class="nav-btn active" type="button">🏠<span>Ana</span></button>
      <button data-page="exam" class="nav-btn" type="button">🎯<span>Deneme</span></button>
      <button data-page="lessons" class="nav-btn" type="button">📖<span>Dersler</span></button>
      <button data-page="wrong" class="nav-btn" type="button">❌<span>Yanlış</span></button>
      <button data-page="stats" class="nav-btn" type="button">📊<span>Analiz</span></button>
    </nav>
  </div>

  <script>
    window.STARQUIZ_BUILD = "trmath1";
    try {
      var old = localStorage.getItem("starquiz_build");
      if (old !== "trmath1") {
        localStorage.setItem("starquiz_build", "trmath1");
        if ("caches" in window) {
          caches.keys().then(function(keys){
            return Promise.all(keys.map(function(k){ return caches.delete(k); }));
          });
        }
      }
    } catch(e) {}
  </script>
  <script src="./questions.js?v=trmath1"></script>
  <script src="./lessons.js?v=trmath1"></script>
  <script src="./app.js?v=trmath1"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function(){
        navigator.serviceWorker.register("./service-worker.js?v=trmath1").then(function(reg){
          if(reg && reg.update) reg.update();
        }).catch(function(){});
      });
    }
  </script>
</body>
</html>
